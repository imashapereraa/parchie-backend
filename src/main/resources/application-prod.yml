spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  docker:
    compose:
      enabled: false

  flyway:
    baseline-on-migrate: true
    baseline-version: 2

  jpa:
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: WARN
    com.parchie: INFO

parchie:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
