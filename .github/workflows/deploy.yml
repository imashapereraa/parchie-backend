name: Deploy to GKE

on:
  push:
    branches: [main]

env:
  PROJECT_ID: parchie
  REGION: us-central1
  CLUSTER: parchie-cluster
  AR_REPO: parchie
  IMAGE: backend

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        env:
          DOCKER_BUILDKIT: 1
        run: |
          IMAGE_URI=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.REGION }}

      - name: Sync k8s secrets from GitHub secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
        run: |
          kubectl create secret generic parchie-secrets \
            --from-literal=database-url="$DATABASE_URL" \
            --from-literal=database-username="$DATABASE_USERNAME" \
            --from-literal=database-password="$DATABASE_PASSWORD" \
            --from-literal=cors-allowed-origins="$CORS_ALLOWED_ORIGINS" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy
        run: |
          IMAGE_URI=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          sed "s|IMAGE_PLACEHOLDER|$IMAGE_URI|g" k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
          kubectl rollout restart deployment/parchie-backend
          kubectl rollout status deployment/parchie-backend --timeout=300s
